name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup venv
        shell: pwsh
        run: ./src/setup.ps1

      - name: Build portable EXE
        shell: pwsh
        run: ./src/build.ps1 -NoVersionBump

      - name: Publish GitHub Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/AP1-Konfigurator-Portable-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
